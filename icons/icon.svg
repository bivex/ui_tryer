<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Police badge background -->
  <circle cx="64" cy="64" r="60" fill="#FFD700" stroke="#B8860B" stroke-width="4"/>

  <!-- Police badge border -->
  <circle cx="64" cy="64" r="56" fill="none" stroke="#000000" stroke-width="2"/>
  <circle cx="64" cy="64" r="52" fill="none" stroke="#FFD700" stroke-width="1"/>

  <!-- Police star -->
  <path d="M64 25 L70 45 L90 45 L74 57 L80 77 L64 65 L48 77 L54 57 L38 45 L58 45 Z"
        fill="#000080" stroke="#FFD700" stroke-width="2"/>

  <!-- Police text -->
  <text x="64" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#000080">POLICE</text>
  <text x="64" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#000080">UI CRIMES</text>

  <!-- Magnifying glass -->
  <circle cx="40" cy="40" r="15" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  <circle cx="40" cy="40" r="8" fill="none" stroke="#000000" stroke-width="3"/>
  <line x1="48" y1="48" x2="55" y2="55" stroke="#000000" stroke-width="3" stroke-linecap="round"/>

  <!-- Warning triangle -->
  <polygon points="88,35 98,50 78,50" fill="#FF4444" stroke="#CC0000" stroke-width="1"/>
  <text x="88" y="47" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">!</text>
</svg>
